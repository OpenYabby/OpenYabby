version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    # Major bumps almost always need code changes (Express 5, Redis 5,
    # Mem0 v3 all break the v4 API). Skip them by default; bump them
    # deliberately as scoped PRs.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # Group patches into one PR per group, but let minor bumps come in
    # individually. Minor versions on SDKs we depend on (anthropic, zod,
    # google/genai, etc.) too often ship breaking changes that need
    # case-by-case review and testing, grouping them masks the risk.
    # @cloudflare/workers-types is excluded because it is being removed
    # from the project (see #18).
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - patch
        exclude-patterns:
          - "@cloudflare/workers-types"
      dev-deps:
        dependency-type: development
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
