version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    # Major bumps almost always need code changes (Express 5, Redis 5,
    # Mem0 v3 all break the v4 API). Skip them by default; bump them
    # deliberately as scoped PRs.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev-deps:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
