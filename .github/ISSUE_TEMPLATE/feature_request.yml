name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the user-facing pain point first. "I want to do X but Y blocks me" is much more useful than "add Z".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd like it to work. Sketches, API shapes, and example interactions all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today, or what other shapes did you reject and why?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Voice / Realtime API
        - Multi-agent orchestration
        - Channels (Discord/Slack/Telegram/WhatsApp/Signal)
        - Connectors / MCP
        - CLI runners
        - Memory / Mem0
        - Frontend / SPA
        - Plugins
        - Docs
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to send a PR for this if the maintainers are open to it.
