<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f8f8"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="voicePathGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#666666"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#222222" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLight" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#222222" flood-opacity="0.08"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowDk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222222"/>
    </marker>
    <marker id="arrowLight" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999999"/>
    </marker>
    <marker id="arrowDark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111111"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fff"/>
    </marker>
    <marker id="arrowBidir" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#222222"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="url(#bgGrad)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="44" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="900" height="24" fill="url(#headerGrad)"/>
  <text x="450" y="29" text-anchor="middle" fill="white" font-size="16" font-weight="700" letter-spacing="0.5">OpenYabby Architecture</text>

  <!-- ============================================ -->
  <!-- LAYER LABELS (left side, vertical) -->
  <!-- ============================================ -->

  <!-- CLIENT LAYER group background -->
  <rect x="16" y="56" width="868" height="148" rx="10" fill="url(#clientGrad)" stroke="#cccccc" stroke-width="1" opacity="0.6"/>
  <text x="28" y="74" fill="#333333" font-size="10" font-weight="700" letter-spacing="1" text-transform="uppercase">CLIENT LAYER</text>

  <!-- API LAYER group background -->
  <rect x="16" y="216" width="868" height="100" rx="10" fill="url(#apiGrad)" opacity="0.35" stroke="#999999" stroke-width="1"/>
  <text x="28" y="234" fill="#444444" font-size="10" font-weight="700" letter-spacing="1">API LAYER</text>

  <!-- SERVICES LAYER group background -->
  <rect x="16" y="328" width="868" height="148" rx="10" fill="url(#serviceGrad)" stroke="#cccccc" stroke-width="1" opacity="0.6"/>
  <text x="28" y="346" fill="#333333" font-size="10" font-weight="700" letter-spacing="1">SERVICES LAYER</text>

  <!-- DATA LAYER group background -->
  <rect x="16" y="488" width="868" height="118" rx="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="1" opacity="0.6"/>
  <text x="28" y="506" fill="#333333" font-size="10" font-weight="700" letter-spacing="1">DATA &amp; INTEGRATIONS</text>

  <!-- ============================================ -->
  <!-- CLIENT LAYER NODES -->
  <!-- ============================================ -->

  <!-- Browser node -->
  <rect x="60" y="88" width="140" height="52" rx="10" fill="white" stroke="#222222" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="111" text-anchor="middle" fill="#111111" font-size="13" font-weight="700">Browser</text>
  <text x="130" y="128" text-anchor="middle" fill="#333333" font-size="9.5">VAD + WebRTC + UI</text>

  <!-- OpenAI Realtime API node -->
  <rect x="370" y="80" width="180" height="60" rx="10" fill="#3b0f80" stroke="#5b21b6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="105" text-anchor="middle" fill="white" font-size="13" font-weight="700">OpenAI Realtime API</text>
  <text x="460" y="122" text-anchor="middle" fill="#e8e8e8" font-size="9.5">Bidirectional Voice</text>

  <!-- Frontend SPA node -->
  <rect x="660" y="88" width="160" height="52" rx="10" fill="white" stroke="#222222" stroke-width="2" filter="url(#shadow)"/>
  <text x="740" y="111" text-anchor="middle" fill="#111111" font-size="13" font-weight="700">Frontend SPA</text>
  <text x="740" y="128" text-anchor="middle" fill="#333333" font-size="9.5">Vanilla JS + State Mgmt</text>

  <!-- Voice path: Browser -> OpenAI (WebRTC) -->
  <line x1="200" y1="104" x2="368" y2="104" stroke="#4c1d95" stroke-width="2.5" marker-end="url(#arrowDk)"/>
  <rect x="236" y="78" width="80" height="18" rx="4" fill="#4c1d95" opacity="0.9"/>
  <text x="276" y="90" text-anchor="middle" fill="white" font-size="8.5" font-weight="600">WebRTC</text>

  <!-- Voice path: OpenAI -> Browser (bidirectional) -->
  <line x1="370" y1="118" x2="202" y2="118" stroke="#999999" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowLight)"/>
  <text x="286" y="132" text-anchor="middle" fill="#222222" font-size="8" font-style="italic">SDP answer + audio</text>

  <!-- Voice path: OpenAI -> Frontend (voice tools dispatch) -->
  <line x1="550" y1="110" x2="658" y2="110" stroke="#4c1d95" stroke-width="2" marker-end="url(#arrowDk)"/>
  <text x="604" y="104" text-anchor="middle" fill="#444444" font-size="8" font-weight="600">Voice dispatch</text>

  <!-- DataChannel: Browser -> Frontend (tool calls) -->
  <path d="M 130 140 L 130 166 L 740 166 L 740 140" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowLight)"/>
  <rect x="370" y="156" width="130" height="18" rx="4" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="435" y="169" text-anchor="middle" fill="#333333" font-size="8.5" font-weight="600">DataChannel (tools)</text>

  <!-- ============================================ -->
  <!-- API LAYER NODES -->
  <!-- ============================================ -->

  <!-- Express Server node (central, wide) -->
  <rect x="210" y="240" width="500" height="58" rx="12" fill="white" stroke="#222222" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="460" y="262" text-anchor="middle" fill="#111111" font-size="15" font-weight="700">Express Server</text>

  <!-- Protocol badges centered below title -->
  <rect x="355" y="272" width="56" height="16" rx="4" fill="#f0f0f0"/>
  <text x="383" y="283" text-anchor="middle" fill="#222222" font-size="8" font-weight="600">REST API</text>
  <rect x="419" y="272" width="80" height="16" rx="4" fill="#f0f0f0"/>
  <text x="459" y="283" text-anchor="middle" fill="#222222" font-size="8" font-weight="600">SSE Events</text>
  <rect x="507" y="272" width="72" height="16" rx="4" fill="#f0f0f0"/>
  <text x="543" y="283" text-anchor="middle" fill="#222222" font-size="8" font-weight="600">WebSocket</text>

  <!-- Frontend -> Express -->
  <line x1="740" y1="140" x2="710" y2="241" stroke="#222222" stroke-width="1.8" marker-end="url(#arrowDk)"/>

  <!-- Browser -> Express (direct API) -->
  <line x1="130" y1="140" x2="212" y2="252" stroke="#999999" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowLight)"/>

  <!-- ============================================ -->
  <!-- SERVICES LAYER NODES -->
  <!-- ============================================ -->

  <!-- CLI Runners -->
  <rect x="40" y="356" width="130" height="50" rx="8" fill="white" stroke="#666666" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="105" y="378" text-anchor="middle" fill="#111111" font-size="11" font-weight="700">CLI Runners</text>
  <text x="105" y="394" text-anchor="middle" fill="#333333" font-size="8.5">Claude, Codex, Aider...</text>

  <!-- Spawner -->
  <rect x="190" y="356" width="120" height="50" rx="8" fill="white" stroke="#666666" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="250" y="378" text-anchor="middle" fill="#111111" font-size="11" font-weight="700">Task Spawner</text>
  <text x="250" y="394" text-anchor="middle" fill="#333333" font-size="8.5">Process lifecycle</text>

  <!-- Orchestrator -->
  <rect x="330" y="356" width="130" height="50" rx="8" fill="white" stroke="#666666" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="395" y="378" text-anchor="middle" fill="#111111" font-size="11" font-weight="700">Orchestrator</text>
  <text x="395" y="394" text-anchor="middle" fill="#333333" font-size="8.5">Multi-agent cascades</text>

  <!-- Tool Registry -->
  <rect x="480" y="356" width="130" height="50" rx="8" fill="white" stroke="#666666" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="545" y="378" text-anchor="middle" fill="#111111" font-size="11" font-weight="700">Tool Registry</text>
  <text x="545" y="394" text-anchor="middle" fill="#333333" font-size="8.5">Base + Plugin + MCP</text>

  <!-- Providers -->
  <rect x="630" y="356" width="120" height="50" rx="8" fill="white" stroke="#666666" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="690" y="378" text-anchor="middle" fill="#111111" font-size="11" font-weight="700">LLM Providers</text>
  <text x="690" y="394" text-anchor="middle" fill="#333333" font-size="8.5">OpenAI, Claude, Groq...</text>

  <!-- Scheduler -->
  <rect x="770" y="356" width="100" height="50" rx="8" fill="white" stroke="#666666" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="820" y="378" text-anchor="middle" fill="#111111" font-size="11" font-weight="700">Scheduler</text>
  <text x="820" y="394" text-anchor="middle" fill="#333333" font-size="8.5">Cron / interval</text>

  <!-- Arrows from Express to services -->
  <line x1="310" y1="298" x2="105" y2="354" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowDk)"/>
  <line x1="370" y1="298" x2="250" y2="354" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowDk)"/>
  <line x1="430" y1="298" x2="395" y2="354" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowDk)"/>
  <line x1="510" y1="298" x2="545" y2="354" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowDk)"/>
  <line x1="580" y1="298" x2="690" y2="354" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowDk)"/>
  <line x1="640" y1="298" x2="820" y2="354" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowDk)"/>

  <!-- ============================================ -->
  <!-- DATA & INTEGRATIONS LAYER NODES -->
  <!-- ============================================ -->

  <!-- PostgreSQL -->
  <rect x="40" y="514" width="110" height="50" rx="8" fill="#1a0a3e" stroke="#4c1d95" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="536" text-anchor="middle" fill="white" font-size="11" font-weight="700">PostgreSQL</text>
  <text x="95" y="552" text-anchor="middle" fill="#cccccc" font-size="8.5">Source of truth</text>

  <!-- Redis -->
  <rect x="168" y="514" width="110" height="50" rx="8" fill="#1a0a3e" stroke="#4c1d95" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="223" y="536" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis</text>
  <text x="223" y="552" text-anchor="middle" fill="#cccccc" font-size="8.5">Cache + Pub/Sub</text>

  <!-- Mem0 -->
  <rect x="296" y="514" width="110" height="50" rx="8" fill="#1a0a3e" stroke="#4c1d95" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="351" y="536" text-anchor="middle" fill="white" font-size="11" font-weight="700">Mem0</text>
  <text x="351" y="552" text-anchor="middle" fill="#cccccc" font-size="8.5">Qdrant + SQLite</text>

  <!-- MCP Servers -->
  <rect x="424" y="514" width="110" height="50" rx="8" fill="#1a0a3e" stroke="#4c1d95" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="479" y="536" text-anchor="middle" fill="white" font-size="11" font-weight="700">MCP Servers</text>
  <text x="479" y="552" text-anchor="middle" fill="#cccccc" font-size="8.5">Extensible tools</text>

  <!-- Channels (wide, with icons) -->
  <rect x="552" y="514" width="320" height="50" rx="8" fill="#1a0a3e" stroke="#4c1d95" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="712" y="533" text-anchor="middle" fill="white" font-size="11" font-weight="700">Channels</text>
  <!-- Channel badges -->
  <rect x="580" y="542" width="48" height="16" rx="4" fill="#222222"/>
  <text x="604" y="553" text-anchor="middle" fill="white" font-size="7.5" font-weight="600">Slack</text>
  <rect x="636" y="542" width="52" height="16" rx="4" fill="#222222"/>
  <text x="662" y="553" text-anchor="middle" fill="white" font-size="7.5" font-weight="600">Discord</text>
  <rect x="696" y="542" width="56" height="16" rx="4" fill="#222222"/>
  <text x="724" y="553" text-anchor="middle" fill="white" font-size="7.5" font-weight="600">Telegram</text>
  <rect x="760" y="542" width="50" height="16" rx="4" fill="#222222"/>
  <text x="785" y="553" text-anchor="middle" fill="white" font-size="7.5" font-weight="600">Signal</text>
  <rect x="818" y="542" width="40" height="16" rx="4" fill="#222222"/>
  <text x="838" y="553" text-anchor="middle" fill="white" font-size="7.5" font-weight="600">WA</text>

  <!-- Arrows from services to data layer -->
  <line x1="105" y1="406" x2="95" y2="512" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDark)"/>
  <line x1="250" y1="406" x2="223" y2="512" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDark)"/>

  <!-- Agent Bus arrow from Redis -->
  <rect x="176" y="420" width="94" height="18" rx="4" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="223" y="433" text-anchor="middle" fill="#333333" font-size="8" font-weight="600">Agent Bus</text>
  <line x1="223" y1="438" x2="223" y2="512" stroke="#999999" stroke-width="1.2" marker-end="url(#arrowLight)"/>

  <!-- Orchestrator to Mem0 -->
  <line x1="395" y1="406" x2="351" y2="512" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDark)"/>

  <!-- Tool Registry to MCP -->
  <line x1="545" y1="406" x2="479" y2="512" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDark)"/>

  <!-- Providers to Channels -->
  <line x1="690" y1="406" x2="712" y2="512" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDark)"/>

  <!-- Dual-write annotation between PG and Redis -->
  <rect x="133" y="568" width="60" height="16" rx="4" fill="white" stroke="#cccccc" stroke-width="1"/>
  <text x="163" y="579" text-anchor="middle" fill="#333333" font-size="7" font-weight="600">dual write</text>
  <line x1="95" y1="576" x2="95" y2="564" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDark)"/>
  <line x1="133" y1="576" x2="95" y2="576" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="193" y1="576" x2="223" y2="576" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="223" y1="576" x2="223" y2="564" stroke="#444444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowDark)"/>

  <!-- ============================================ -->
  <!-- VOICE PATH HIGHLIGHT -->
  <!-- ============================================ -->
  <!-- Subtle glow behind the voice path -->
  <rect x="56" y="84" width="500" height="60" rx="14" fill="#222222" opacity="0.04"/>

  <!-- ============================================ -->
  <!-- AGENT HIERARCHY ANNOTATION (right side) -->
  <!-- ============================================ -->
  <rect x="775" y="240" width="96" height="58" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="823" y="256" text-anchor="middle" fill="#444444" font-size="9" font-weight="700">Agent Hierarchy</text>
  <!-- Tree: vertical trunk + branches + labels -->
  <line x1="790" y1="264" x2="790" y2="290" stroke="#999999" stroke-width="1"/>
  <line x1="790" y1="268" x2="796" y2="268" stroke="#999999" stroke-width="1"/>
  <line x1="790" y1="279" x2="796" y2="279" stroke="#999999" stroke-width="1"/>
  <line x1="790" y1="290" x2="796" y2="290" stroke="#999999" stroke-width="1"/>
  <text x="799" y="271" fill="#333333" font-size="8">Lead</text>
  <text x="799" y="282" fill="#333333" font-size="8">Manager</text>
  <text x="799" y="293" fill="#333333" font-size="8">Sub-agent</text>

  <!-- Connect agent hierarchy to Express -->
  <line x1="775" y1="269" x2="710" y2="269" stroke="#cccccc" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ============================================ -->
  <!-- LEGEND (bottom) -->
  <!-- ============================================ -->
  <rect x="240" y="582" width="420" height="28" rx="6" fill="white" stroke="#dddddd" stroke-width="1" opacity="0.9"/>
  <!-- Solid line -->
  <line x1="260" y1="596" x2="288" y2="596" stroke="#222222" stroke-width="2"/>
  <text x="294" y="600" fill="#444444" font-size="8.5">Primary flow</text>
  <!-- Dashed line -->
  <line x1="370" y1="596" x2="398" y2="596" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="404" y="600" fill="#444444" font-size="8.5">Secondary / async</text>
  <!-- Dark node sample -->
  <rect x="500" y="590" width="16" height="12" rx="3" fill="#111111"/>
  <text x="522" y="600" fill="#444444" font-size="8.5">Data store</text>
  <!-- Light node sample -->
  <rect x="586" y="590" width="16" height="12" rx="3" fill="white" stroke="#666666" stroke-width="1.5"/>
  <text x="608" y="600" fill="#444444" font-size="8.5">Service</text>
</svg>